name: my_bill
description: "Electricity and water bill management for 6 rooms (Khmer + English)."
publish_to: 'none'
version: 4.0.0+4

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  get: ^4.7.3
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  shared_preferences: ^2.5.5
  pdf: ^3.12.0
  printing: ^5.14.3
  excel: ^4.0.6
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  package_info_plus: ^10.1.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
    - .env

  fonts:
    - family: NotoSansKhmer
      fonts:
        - asset: assets/fonts/NotoSansKhmer-Regular.ttf
