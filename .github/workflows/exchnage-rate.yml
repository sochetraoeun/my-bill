# Daily Cambodia MEF USD/KHR → Firestore (settings/exchange_rate).
# Cron is UTC: 0 0 * * * = 00:00 UTC = 07:00 Asia/Phnom_Penh (no DST).

name: Exchange rate fetch

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch-rate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fetch-rate.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # Optional — override MEF URL (see .env.example).
          EXCHANGE_RATE_API_URL: ${{ secrets.EXCHANGE_RATE_API_URL }}
          # Optional — if GitHub runners cannot reach MEF without a proxy.
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: node fetch-rate.js
